{% extends 'index.html' %}
{% load static %}
{% block body %}
<center>
    <section class="logins py-5">
        <div class="container py-xl-5 py-lg-3">
            <div class="title-section mb-md-5 mb-4">
                <h3 class="w3ls-title text-uppercase text-dark font-weight-bold">Add Heart Detail</h3>
            </div>
            <hr />
            <div class="login px-sm-12" style="width:100%">
                <form action="" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="form-group row">
                        <div class="col-md-2">
                            <label>Age</label>
                            <input type="number" class="form-control" name="age" required="">
                        </div>
                        <div class="col-md-2">
                            <label>Sex</label>
                            <input type="number" class="form-control" name="sex" required="" placeholder="0 = Female, 1 = Male">
                        </div>
                        <div class="col-md-2">
                            <label>Chest Pain</label>
                            <select class="form-control" name="cp" required="">
                                <option value="1">Type 1 (Typical Angina)</option>
                                <option value="2">Type 2 (Atypical Angina)</option>
                                <option value="3">Type 3 (Non-Anginal)</option>
                                <option value="4">Type 4 (Asymptomatic)</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label>Resting BP</label>
                            <input type="number" class="form-control" name="trestbps" required="">
                        </div>
                        <div class="col-md-2">
                            <label>Cholestrol</label>
                            <input type="number" class="form-control" name="chole" required="">
                        </div>
                        <div class="col-md-2">
                            <label>Fasting BS</label>
                            <input type="number" class="form-control" name="fbs" required="" placeholder="0 or 1">
                        </div>
                    </div>
                    <div class="form-group row">
                        <div class="col-md-2">
                            <label>ECG</label>
                            <input type="number" class="form-control" name="restecg" required="">
                        </div>
                        <div class="col-md-2">
                            <label>Max Heart Rate</label>
                            <input type="number" class="form-control" name="thalach" required="">
                        </div>
                        <div class="col-md-2">
                            <label>Exercise Induced</label>
                            <input type="number" class="form-control" name="exang" required="" placeholder="0 = No, 1 = Yes">
                        </div>
                        <div class="col-md-2">
                            <label>Oldpeak</label>
                            <input type="number" step="0.1" class="form-control" name="old_peak" required="">
                        </div>
                        <div class="col-md-2">
                            <label>Slope</label>
                            <input type="number" class="form-control" name="slope" required="">
                        </div>
                        <div class="col-md-2">
                            <label>Cardiac Arrest</label>
                            <input type="number" class="form-control" name="ca" required="">
                        </div>
                        <div class="col-md-2">
                            <label>Thalassemia</label>
                            <input type="number" class="form-control" name="thal" required="">
                        </div>
                    </div>
                    <button type="submit" class="btn submit mt-4" style="background-color: #726f6e;">Send Heart Data</button>
                </form>
            </div>
        </div>
    </section>
</center>
{% endblock %}
